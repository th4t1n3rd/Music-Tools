<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Note Reader">
<meta name="theme-color" content="#0b0f1a">
<title>Note Naming Trainer</title>
<style>
  :root{
    --bg: #0a1628;
    --panel: #0f2038;
    --panel2: #16304f;
    --border: #1e3a5c;
    --text: #e6f1ff;
    --muted: #8fb3d9;
    --cyan: #36d6e0;
    --cyan-dim: #1a8a92;
    --good: #36e0a0;
    --bad: #ff6b6b;
  }
  *{ box-sizing: border-box; }
  body{
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 3rem;
  }
  h1{
    font-weight: 500;
    font-size: 1.6rem;
    margin: 0 0 0.25rem;
    color: var(--cyan);
    letter-spacing: 0.5px;
  }
  .sub{ color: var(--muted); font-size: 0.95rem; margin: 0 0 1.5rem; }
  .wrap{ width: 100%; max-width: 460px; }
  .controls{ display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  button{
    background: var(--panel2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px;
    font-size: 0.9rem;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.05s;
  }
  button:hover{ border-color: var(--cyan-dim); background: #1b3a5e; }
  button:active{ transform: scale(0.97); }
  .staffbox{
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    display: flex;
    justify-content: center;
    margin-bottom: 1rem;
  }
  #staff{ width: 100%; max-width: 360px; }
  #feedback{
    text-align: center;
    min-height: 26px;
    font-size: 1rem;
    font-weight: 500;
    margin-bottom: 0.85rem;
    color: var(--muted);
  }
  .answers{ display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 1.25rem; }
  .answers button{ font-size: 1.05rem; font-weight: 500; padding: 12px 0; }
  .stats{ display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .stat{
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.85rem;
    text-align: center;
  }
  .stat .label{ font-size: 0.8rem; color: var(--muted); }
  .stat .val{ font-size: 1.5rem; font-weight: 500; color: var(--cyan); margin-top: 2px; }
  footer{ margin-top: 2rem; color: var(--muted); font-size: 0.8rem; text-align: center; }
  .back-link{
    position: fixed; top: 0; left: 0; z-index: 50;
    display: inline-flex; align-items: center; gap: 0.4rem;
    margin: 0.9rem; padding: 0.5rem 0.85rem;
    background: rgba(15,32,56,0.85); border: 1px solid var(--border); border-radius: 8px;
    color: var(--cyan); text-decoration: none;
    font-size: 0.8rem; letter-spacing: 0.04em;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    transition: border-color 0.15s, color 0.15s;
  }
  .back-link:hover{ border-color: var(--cyan); color: #7fe9f0; }
</style>
</head>
<body>
  <a class="back-link" href="index.html">‹ Menu</a>
  <h1 style="margin-top:1.6rem;">Note Naming Trainer</h1>
  <p class="sub">Identify the note on the staff &mdash; treble &amp; bass clef</p>

  <div class="wrap">
    <div class="controls">
      <button id="clef-toggle">Clef: Treble</button>
      <button id="ledger-toggle">Ledger lines: Off</button>
      <button id="reset-btn">&#8635; Reset</button>
    </div>

    <div class="staffbox">
      <svg id="staff" viewBox="0 0 360 220" role="img" aria-label="Music staff with a note to identify"></svg>
    </div>

    <div id="feedback">Name the note below</div>

    <div class="answers" id="answers"></div>

    <div class="stats">
      <div class="stat"><div class="label">Correct</div><div class="val" id="stat-correct">0</div></div>
      <div class="stat"><div class="label">Accuracy</div><div class="val" id="stat-acc">&mdash;</div></div>
      <div class="stat"><div class="label">Streak</div><div class="val" id="stat-streak">0</div></div>
    </div>
  </div>

  <footer>Click the letter that matches the note. Flip on ledger lines once the staff feels easy.</footer>

<script>
(function(){
  var LETTERS = ["C","D","E","F","G","A","B"];
  var svg = document.getElementById("staff");
  var SVGNS = "http://www.w3.org/2000/svg";

  var TOP = 40, GAP = 16, STEP = 8, X = 230;
  var LINE_X1 = 30, LINE_X2 = 330;

  var clef = "treble";
  var ledger = false;
  var current = null;
  var correct = 0, total = 0, streak = 0;

  function dn(letter, octave){ return octave*7 + LETTERS.indexOf(letter); }

  var anchors = {
    treble: { dn: dn("E",4), y: TOP + 4*GAP },
    bass:   { dn: dn("G",2), y: TOP + 4*GAP }
  };

  function yFor(d){
    var a = anchors[clef];
    return a.y - (d - a.dn) * STEP;
  }

  function candidates(){
    var a = anchors[clef];
    var list = [];
    var lo = ledger ? a.dn - 4 : a.dn;
    var hi = ledger ? a.dn + 12 : a.dn + 8;
    for(var d = lo; d <= hi; d++){ list.push(d); }
    return list;
  }

  function letterFor(d){
    var idx = ((d % 7) + 7) % 7;
    return LETTERS[idx];
  }

  function drawStaff(){
    while(svg.firstChild) svg.removeChild(svg.firstChild);
    for(var i=0;i<5;i++){
      var ln = document.createElementNS(SVGNS,"line");
      ln.setAttribute("x1", LINE_X1); ln.setAttribute("x2", LINE_X2);
      var y = TOP + i*GAP;
      ln.setAttribute("y1", y); ln.setAttribute("y2", y);
      ln.setAttribute("stroke", "#5a7da8");
      ln.setAttribute("stroke-width", "1.2");
      svg.appendChild(ln);
    }
    var c = document.createElementNS(SVGNS,"text");
    c.setAttribute("x", 44);
    c.setAttribute("y", clef==="treble"? TOP+3.4*GAP : TOP+2.2*GAP);
    c.setAttribute("font-size", clef==="treble"? "76":"54");
    c.setAttribute("text-anchor","middle");
    c.setAttribute("fill","#e6f1ff");
    c.setAttribute("font-family","serif");
    c.textContent = clef==="treble" ? "\uD834\uDD1E" : "\uD834\uDD22";
    svg.appendChild(c);
  }

  function addLedger(y){
    var ln = document.createElementNS(SVGNS,"line");
    ln.setAttribute("x1", X-15); ln.setAttribute("x2", X+15);
    ln.setAttribute("y1", y); ln.setAttribute("y2", y);
    ln.setAttribute("stroke","#5a7da8");
    ln.setAttribute("stroke-width","1.2");
    svg.appendChild(ln);
  }

  function drawNote(d){
    var topLineY = TOP, botLineY = TOP + 4*GAP;
    var ny = yFor(d);
    var yy;
    for(yy = topLineY - GAP; yy >= ny - 2; yy -= GAP){ addLedger(yy); }
    for(yy = botLineY + GAP; yy <= ny + 2; yy += GAP){ addLedger(yy); }

    var g = document.createElementNS(SVGNS,"g");
    var head = document.createElementNS(SVGNS,"ellipse");
    head.setAttribute("cx", X); head.setAttribute("cy", ny);
    head.setAttribute("rx", 9); head.setAttribute("ry", 6.5);
    head.setAttribute("transform", "rotate(-20 "+X+" "+ny+")");
    head.setAttribute("fill", "#36d6e0");
    g.appendChild(head);

    var stemUp = ny > (TOP + 2*GAP);
    var stem = document.createElementNS(SVGNS,"line");
    if(stemUp){
      stem.setAttribute("x1", X+8.5); stem.setAttribute("x2", X+8.5);
      stem.setAttribute("y1", ny); stem.setAttribute("y2", ny-46);
    } else {
      stem.setAttribute("x1", X-8.5); stem.setAttribute("x2", X-8.5);
      stem.setAttribute("y1", ny); stem.setAttribute("y2", ny+46);
    }
    stem.setAttribute("stroke","#36d6e0");
    stem.setAttribute("stroke-width","2");
    g.appendChild(stem);
    svg.appendChild(g);
  }

  function newNote(){
    var pool = candidates();
    current = pool[Math.floor(Math.random()*pool.length)];
    drawStaff();
    drawNote(current);
    var fb = document.getElementById("feedback");
    fb.textContent = "Name the note below";
    fb.style.color = "#8fb3d9";
  }

  function buildAnswers(){
    var box = document.getElementById("answers");
    box.innerHTML = "";
    LETTERS.forEach(function(L){
      var b = document.createElement("button");
      b.textContent = L;
      b.onclick = function(){ guess(L); };
      box.appendChild(b);
    });
  }

  function octaveLabel(d){
    var oct = Math.floor(d/7);
    return " (" + letterFor(d) + oct + ")";
  }

  function guess(L){
    if(current === null) return;
    var ans = letterFor(current);
    total++;
    var fb = document.getElementById("feedback");
    if(L === ans){
      correct++; streak++;
      fb.textContent = "Correct \u2014" + octaveLabel(current);
      fb.style.color = "#36e0a0";
      current = null;
      setTimeout(newNote, 650);
    } else {
      streak = 0;
      fb.textContent = "Not quite \u2014 that was " + ans;
      fb.style.color = "#ff6b6b";
    }
    updateStats();
  }

  function updateStats(){
    document.getElementById("stat-correct").textContent = correct;
    document.getElementById("stat-streak").textContent = streak;
    document.getElementById("stat-acc").textContent = total ? Math.round(correct/total*100) + "%" : "\u2014";
  }

  document.getElementById("clef-toggle").onclick = function(){
    clef = clef==="treble" ? "bass" : "treble";
    this.textContent = "Clef: " + (clef==="treble"?"Treble":"Bass");
    newNote();
  };
  document.getElementById("ledger-toggle").onclick = function(){
    ledger = !ledger;
    this.textContent = "Ledger lines: " + (ledger?"On":"Off");
    newNote();
  };
  document.getElementById("reset-btn").onclick = function(){
    correct=0; total=0; streak=0; updateStats(); newNote();
  };

  buildAnswers();
  updateStats();
  newNote();
})();
</script>
</body>
</html>
