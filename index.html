<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Music Tools">
<meta name="theme-color" content="#0b0f1a">
<title>Music Theory Tools</title>
<style>
  :root {
    --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
    --font-mono: ui-monospace, 'SF Mono', Menlo, Monaco, 'Cascadia Mono', 'Roboto Mono', monospace;
    --bg:#0b0f1a; --surface:#111827; --surface2:#1a2235; --border:#1e2d45;
    --accent:#38bdf8; --accent2:#818cf8; --accent3:#34d399;
    --text:#e2e8f0; --muted:#64748b;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(circle at 50% 0%, #14233f 0%, var(--bg) 55%);
    color: var(--text); font-family: var(--font-ui);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 3rem 1.2rem 4rem;
  }
  header { text-align: center; margin-bottom: 2.6rem; }
  header h1 {
    font-family: var(--font-mono); font-size: clamp(1.5rem, 4vw, 2.3rem); font-weight: 700;
    letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase; line-height: 1.3;
  }
  header p { margin-top: 1rem; font-size: 0.9rem; color: var(--muted); letter-spacing: 0.04em; }

  .grid {
    display: grid; grid-template-columns: 1fr; gap: 1rem;
    width: 100%; max-width: 460px;
  }
  @media (min-width: 520px) { .grid { grid-template-columns: 1fr 1fr; } }

  .card {
    display: flex; align-items: center; gap: 1rem;
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 1.2rem 1.3rem; text-decoration: none; color: inherit;
    transition: border-color 0.16s, transform 0.08s, box-shadow 0.16s;
  }
  .card:hover, .card:active {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 10px 26px -14px rgba(56,189,248,0.55);
  }
  .icon {
    flex-shrink: 0; width: 50px; height: 50px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface2); border: 1px solid var(--border);
  }
  .icon svg { width: 28px; height: 28px; }
  .card-text h2 { font-size: 1.02rem; font-weight: 600; color: var(--text); margin-bottom: 0.2rem; }
  .card-text p { font-size: 0.78rem; color: var(--muted); line-height: 1.4; }

  .footer { margin-top: 2.6rem; font-size: 0.74rem; color: var(--muted); text-align: center; line-height: 1.6; }
</style>
</head>
<body>

<header>
  <h1>Music Theory Tools</h1>
  <p>Practice scales, chords, cadences, arpeggios &amp; progressions</p>
</header>

<div class="grid">
  <a class="card" href="https://th4t1n3rd.github.io/Piano-App/">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none">
        <rect x="2" y="4" width="20" height="16" rx="2" stroke="#38bdf8" stroke-width="1.6"/>
        <line x1="7" y1="4" x2="7" y2="14" stroke="#38bdf8" stroke-width="1.4"/>
        <line x1="12" y1="4" x2="12" y2="14" stroke="#38bdf8" stroke-width="1.4"/>
        <line x1="17" y1="4" x2="17" y2="14" stroke="#38bdf8" stroke-width="1.4"/>
        <rect x="5.4" y="4" width="3.2" height="8" rx="0.6" fill="#818cf8"/>
        <rect x="10.4" y="4" width="3.2" height="8" rx="0.6" fill="#818cf8"/>
        <rect x="15.4" y="4" width="3.2" height="8" rx="0.6" fill="#818cf8"/>
      </svg>
    </div>
    <div class="card-text">
      <h2>Scales &amp; Chords</h2>
    </div>
  </a>

  <a class="card" href="https://th4t1n3rd.github.io/Cadences/">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M4 16V7l5-1.5V14" stroke="#34d399" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="4" cy="16" r="2" fill="#34d399"/>
        <circle cx="9" cy="14" r="2" fill="#34d399"/>
        <path d="M15 18v-9l5-1.5V16" stroke="#38bdf8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="15" cy="18" r="2" fill="#38bdf8"/>
        <circle cx="20" cy="16" r="2" fill="#38bdf8"/>
      </svg>
    </div>
    <div class="card-text">
      <h2>Cadences</h2>
    </div>
  </a>

  <a class="card" href="https://th4t1n3rd.github.io/Arpeggios/">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="5" cy="18" r="2.2" fill="#38bdf8"/>
        <circle cx="11" cy="14" r="2.2" fill="#818cf8"/>
        <circle cx="17" cy="10" r="2.2" fill="#34d399"/>
        <circle cx="21" cy="6" r="2.2" fill="#38bdf8"/>
        <path d="M5 18L11 14L17 10L21 6" stroke="#475569" stroke-width="1.3" stroke-dasharray="2 2"/>
      </svg>
    </div>
    <div class="card-text">
      <h2>Arpeggios</h2>
    </div>
  </a>

  <a class="card" href="https://th4t1n3rd.github.io/Progressions/">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none">
        <rect x="3" y="9" width="3.5" height="6" rx="1" fill="#38bdf8"/>
        <rect x="8" y="6" width="3.5" height="12" rx="1" fill="#818cf8"/>
        <rect x="13" y="9" width="3.5" height="6" rx="1" fill="#34d399"/>
        <rect x="18" y="7" width="3.5" height="10" rx="1" fill="#38bdf8"/>
      </svg>
    </div>
    <div class="card-text">
      <h2>Progressions</h2>
    </div>
  </a>
</div>

</body>
</html>
